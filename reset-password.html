<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Busara School</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: linear-gradient(135deg, #1e3a8a, #3b82f6); min-height: 100vh; padding: 2rem 0;">
    <div class="login-container">
        <div class="glass-card" style="max-width: 450px; padding: 3.5rem; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="color: #00f5ff; font-size: 2.2rem; margin-bottom: 0.5rem;">🔑 Reset Password</h1>
                <p id="resetStatus" style="color: rgba(255,255,255,0.8);">Enter new password</p>
            </div>

            <form id="resetForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <input type="password" id="newPassword" placeholder="🆕 New Password (8+ chars)" required 
                       style="width: 100%; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                <input type="password" id="confirmPassword" placeholder="🔄 Confirm New Password" required 
                       style="width: 100%; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                
                <button type="submit" class="btn" style="width: 100%; padding: 1.3rem; font-size: 1.1rem; background: linear-gradient(135deg, #10b981, #059669);" id="resetBtn">
                    Reset Password
                </button>
            </form>

            <div id="resetMessage" style="display: none; margin-top: 2rem; padding: 1.5rem; border-radius: 12px; text-align: center;"></div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="login.html" style="color: #a8e6cf; font-size: 0.9rem;">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Check reset token from URL
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                document.getElementById('resetStatus').textContent = '❌ Invalid or missing reset link';
                document.getElementById('resetForm').style.display = 'none';
                return;
            }

            // Validate token
            const resetTokens = JSON.parse(localStorage.getItem('busara_reset_tokens') || '[]');
            const validToken = resetTokens.find(t => t.token === token && Date.now() < t.expires);
            
            if (!validToken) {
                document.getElementById('resetStatus').innerHTML = '❌ Reset link expired or invalid<br><a href="forgot-password.html">Request new link</a>';
                document.getElementById('resetForm').style.display = 'none';
                return;
            }

            document.getElementById('resetStatus').textContent = `Valid for ${new Date(validToken.expires).toLocaleTimeString('en-KE')}`;
            window.currentResetToken = validToken;
        });

        // Handle password reset
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('resetBtn');
            
            if (newPassword !== confirmPassword) {
                showMessage('❌ Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showMessage('❌ Password must be 8+ characters', 'error');
                return;
            }

            if (!window.currentResetToken) {
                showMessage('❌ Invalid reset link. Please request a new one.', 'error');
                return;
            }

            // Update user password
            const users = JSON.parse(localStorage.getItem('busara_users') || '[]');
            const userIndex = users.findIndex(u => u.id === window.currentResetToken.userId);
            
            if (userIndex === -1) {
                showMessage('❌ User not found', 'error');
                return;
            }

            users[userIndex].password = newPassword; // In real app, hash this!
            localStorage.setItem('busara_users', JSON.stringify(users));

            // Remove used token
            let resetTokens = JSON.parse(localStorage.getItem('busara_reset_tokens') || '[]');
            resetTokens = resetTokens.filter(t => t.token !== window.currentResetToken.token);
            localStorage.setItem('busara_reset_tokens', JSON.stringify(resetTokens));

            showMessage(`
                ✅ Password reset successful!<br><br>
                You can now <a href="login.html" style="color: #10b981; font-weight: bold;">Login with new password</a>
            `, 'success');
            
            document.getElementById('resetForm').style.display = 'none';
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('resetMessage');
            messageDiv.innerHTML = message;
            messageDiv.style.display = 'block';
            messageDiv.style.background = type === 'success' ? 
                'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)';
            messageDiv.style.border = type === 'success' ? 
                '1px solid rgba(16, 185, 129, 0.5)' : '1px solid rgba(239, 68, 68, 0.5)';
            messageDiv.style.color = 'white';
        }
    </script>
</body>
</html>
