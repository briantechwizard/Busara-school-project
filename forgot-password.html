<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Busara School</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: linear-gradient(135deg, #1e3a8a, #3b82f6); min-height: 100vh; padding: 2rem 0;">
    <div class="login-container">
        <div class="glass-card" style="max-width: 450px; padding: 3.5rem; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="color: #00f5ff; font-size: 2.2rem; margin-bottom: 0.5rem;">🔒 Forgot Password</h1>
                <p style="color: rgba(255,255,255,0.8);">Enter your email to receive reset instructions</p>
            </div>

            <form id="resetForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group">
                    <input type="email" id="resetEmail" placeholder="📧 Enter your email address" required 
                           style="width: 100%; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 1rem;">
                </div>
                
                <button type="submit" class="btn" style="width: 100%; padding: 1.3rem; font-size: 1.1rem; background: linear-gradient(135deg, #10b981, #059669);">
                    Send Reset Link
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <p style="opacity: 0.9;">
                    Remember your password? <a href="login.html" style="color: #00f5ff; font-weight: 600;">Sign In</a>
                </p>
                <a href="signup.html" style="color: #a8e6cf; font-size: 0.9rem;">Create New Account</a>
            </div>

            <div id="resetMessage" style="display: none; margin-top: 2rem; padding: 1.5rem; border-radius: 12px; text-align: center;"></div>
        </div>
    </div>

    <script>
        // Forgot Password with Email Reset Link System
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value.trim().toLowerCase();
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            // Show loading
            submitBtn.textContent = '⏳ Sending Reset Link...';
            submitBtn.disabled = true;
            document.getElementById('resetMessage').style.display = 'none';

            // Check if email exists in our users database
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('busara_users') || '[]');
                const user = users.find(u => u.email === email);
                
                if (!user) {
                    showMessage('❌ No account found with that email address', 'error');
                    resetForm();
                    return;
                }

                // Generate secure reset token (valid for 15 minutes)
                const resetToken = 'reset_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const resetData = {
                    token: resetToken,
                    email: email,
                    expires: Date.now() + 15 * 60 * 1000, // 15 minutes
                    userId: user.id,
                    resetCount: (user.resetCount || 0) + 1
                };

                // Save reset token to localStorage
                let resetTokens = JSON.parse(localStorage.getItem('busara_reset_tokens') || '[]');
                resetTokens = resetTokens.filter(t => Date.now() < t.expires); // Remove expired
                resetTokens.push(resetData);
                localStorage.setItem('busara_reset_tokens', JSON.stringify(resetTokens));

                // Update user reset count
                user.resetCount = resetData.resetCount;
                const userIndex = users.findIndex(u => u.id === user.id);
                users[userIndex] = user;
                localStorage.setItem('busara_users', JSON.stringify(users));

                // SIMULATE EMAIL with detailed reset link
                const resetLink = `${window.location.origin}/reset-password.html?token=${resetToken}`;
                showMessage(`
                    ✅ Reset link sent to ${email}!<br><br>
                    <strong>Reset Link:</strong><br>
                    <a href="${resetLink}" style="color: #10b981; word-break: break-all; font-family: monospace; font-size: 0.9rem;">${resetLink}</a><br><br>
                    ⚠️ Link expires in <strong>15 minutes</strong><br>
                    👆 Click link above or copy-paste to reset password
                `, 'success');
                
                console.log('Reset token saved:', resetData); // For debugging
            }, 1500);
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('resetMessage');
            messageDiv.innerHTML = message;
            messageDiv.style.display = 'block';
            messageDiv.style.background = type === 'success' ? 
                'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)';
            messageDiv.style.border = type === 'success' ? 
                '1px solid rgba(16, 185, 129, 0.5)' : '1px solid rgba(239, 68, 68, 0.5)';
            messageDiv.style.color = 'white';
            
            resetForm();
        }

        function resetForm() {
            const submitBtn = document.querySelector('#resetForm button[type="submit"]');
            submitBtn.textContent = 'Send Reset Link';
            submitBtn.disabled = false;
            document.getElementById('resetEmail').value = '';
        }

        // Auto-focus email field
        window.addEventListener('load', function() {
            document.getElementById('resetEmail').focus();
        });
    </script>
</body>
</html>
