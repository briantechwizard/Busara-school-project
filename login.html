<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Busara Primary & Junior Secondary School</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="padding: 2rem 0;">
    <div class="login-container">
        <div class="glass-card" style="padding: 3.5rem; max-width: 420px; margin: 0 auto;">
            <h2 style="text-align: center; color: #00f5ff; margin-bottom: 2.5rem; font-size: 2.2rem;">Welcome Back</h2>
            
            <!-- Email Field -->
            <div style="margin-bottom: 1.5rem;">
                <input type="email" id="loginEmail" placeholder="Email Address" 
                       style="width: 100%; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 1rem;">
            </div>
            
            <!-- Password Field -->
            <div style="margin-bottom: 1.5rem;">
                <input type="password" id="loginPassword" placeholder="Password" 
                       style="width: 100%; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 1rem;">
            </div>
            
            <!-- Remember Me + Forgot Password -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <label style="display: flex; align-items: center; opacity: 0.9;">
                    <input type="checkbox" id="rememberMe" style="margin-right: 0.8rem; width: 20px; height: 20px;"> Remember me
                </label>
                <a href="forgot-password.html" style="color: #a8e6cf; font-size: 0.9rem; text-decoration: none;">🔒 Forgot Password?</a>
            </div>
            
            <!-- LOGIN BUTTON - CLICK EVENT -->
            <button id="loginBtn" class="btn" style="width: 100%; padding: 1.3rem; font-size: 1.1rem; margin-bottom: 2rem;">
                Sign In
            </button>
            
            <p style="text-align: center; opacity: 0.9;">
                Don't have an account? <a href="signup.html" style="color: #00f5ff; font-weight: 600;">Create Account</a>
            </p>
            <a href="index.html" class="btn" style="width: 100%; background: linear-gradient(135deg, rgba(255,107,107,0.3), rgba(255,139,139,0.3));">Back to Home</a>
        </div>
    </div>

    <script>
        // WAIT FOR PAGE TO FULLY LOAD
        window.onload = function() {
            console.log('Page loaded - attaching login button');
            
            const loginBtn = document.getElementById('loginBtn');
            const emailField = document.getElementById('loginEmail');
            const passwordField = document.getElementById('loginPassword');
            const rememberMe = document.getElementById('rememberMe');
            
            // CLICK EVENT - NOT FORM SUBMIT
            loginBtn.onclick = function() {
                console.log('LOGIN BUTTON CLICKED!');
                
                // Get values
                const email = emailField.value.trim().toLowerCase();
                const password = passwordField.value;
                
                console.log('Email:', email);
                console.log('Password:', password);
                
                // Check if fields are filled
                if (!email || !password) {
                    alert('Please enter email and password');
                    return;
                }
                
                // Load users from signup
                const usersData = localStorage.getItem('busara_users');
                console.log('Users data:', usersData);
                
                if (!usersData) {
                    alert('No users found. Please signup first.');
                    return;
                }
                
                const users = JSON.parse(usersData);
                console.log('Parsed users:', users);
                
                // Find matching user
                const user = users.find(u => u.email === email && u.password === password);
                console.log('Found user:', user);
                
                if (user) {
                    // Save session
                    const userSession = {
                        id: user.id,
                        name: user.name,
                        email: user.email,
                        role: user.role,
                        student_id: user.student_id || '',
                        loggedIn: true,
                        rememberMe: rememberMe.checked
                    };
                    
                    localStorage.setItem('busaraUser', JSON.stringify(userSession));
                    
                    console.log('LOGIN SUCCESS - Role:', user.role);
                    alert('✅ Welcome back, ' + user.name + '!');
                    
                    // Role-based redirect
                    setTimeout(function() {
                        if (user.role === 'Staff/Teacher') {
                            window.location.href = 'admissions.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 800);
                    
                } else {
                    console.log('LOGIN FAILED');
                    alert('❌ Wrong email or password');
                    passwordField.value = ''; // Clear password on fail
                    emailField.focus();
                }
            };

            // ENTER KEY support
            emailField.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loginBtn.click();
            });
            
            passwordField.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loginBtn.click();
            });

            // Auto-fill saved session
            const savedSession = localStorage.getItem('busaraUser');
            if (savedSession) {
                try {
                    const session = JSON.parse(savedSession);
                    if (session.rememberMe && session.loggedIn) {
                        emailField.value = session.email;
                        passwordField.focus();
                    }
                } catch(e) {
                    console.log('Invalid saved session');
                }
            }
        };
    </script>
</body>
</html>
